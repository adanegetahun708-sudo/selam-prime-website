version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: selam_prime_db
    environment:
      POSTGRES_USER: selam_user
      POSTGRES_PASSWORD: selam_password
      POSTGRES_DB: selam_prime
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selam_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - selam_network

  # Express.js Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: selam_prime_api
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://selam_user:selam_password@postgres:5432/selam_prime
      JWT_SECRET: your_jwt_secret_change_in_production
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./uploads:/app/uploads
      - ./backups:/app/backups
    command: npm run dev
    networks:
      - selam_network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: selam_prime_web
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_ENVIRONMENT: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    command: npm start
    networks:
      - selam_network
    restart: unless-stopped

  # pgAdmin - Database Management UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: selam_prime_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@selamprime.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - selam_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  selam_network:
    driver: bridge
